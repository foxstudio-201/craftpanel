<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service · CraftPanel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind.cdn.js"></script>
  <link rel="stylesheet" href="/css/custom.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/socket.io/socket.io.js"></script>
  <!-- Real terminal: xterm.js + fit/web-links/search addons (Console tab) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-search@0.13.0/lib/xterm-addon-search.min.js"></script>
</head>
<body>
  <div class="bg-aurora"></div><div class="bg-grid"></div>
  <div class="app-shell" data-service-shell></div>

  <!-- Shared client -->
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/socket.js"></script>
  <script src="/js/charts.js"></script>
  <script src="/js/service-registry.js"></script>
  <script src="/js/service-sidebar.js"></script>
  <script src="/js/runtime-store.js"></script>
  <script src="/js/layout.js"></script>

  <!-- Per-service tab modules (each registers into window.ServiceTabs) -->
  <script src="/js/service/overview.js"></script>
  <script src="/js/service/console.js"></script>
  <script src="/js/service/files.js"></script>
  <script src="/js/service/environment.js"></script>
  <script src="/js/service/startup.js"></script>
  <script src="/js/service/network.js"></script>
  <script src="/js/service/schedules.js"></script>
  <script src="/js/service/backups.js"></script>
  <script src="/js/service/players.js"></script>
  <script src="/js/service/plugins.js"></script>
  <script src="/js/service/databases.js"></script>
  <script src="/js/service/domains.js"></script>
  <script src="/js/service/ssl.js"></script>
  <script src="/js/service/build.js"></script>
  <script src="/js/service/activity.js"></script>
  <script src="/js/service/settings.js"></script>

  <!-- Router (must load last) -->
  <script src="/js/pages/service.js"></script>
</body>
</html>
