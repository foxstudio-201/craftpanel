<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset password · CraftPanel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind.cdn.js"></script>
  <link rel="stylesheet" href="/css/custom.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="bg-aurora"></div>
  <div class="bg-grid"></div>
  <div class="orb" style="width:22rem;height:22rem;background:#10b981;top:-6rem;left:-5rem;"></div>

  <main class="min-h-screen flex items-center justify-center p-6">
    <div class="glass glass-card w-full max-w-md p-8 fade-in-up">
      <a href="/login" class="inline-flex items-center gap-1 text-sm text-slate-400 hover:text-white mb-6"><i data-lucide="arrow-left" class="w-4 h-4"></i> Back to sign in</a>
      <h2 class="text-2xl font-bold mb-1">Reset your password</h2>
      <p class="text-slate-400 text-sm mb-6">Enter your email and we'll send a reset link.</p>

      <!-- Step 1: request -->
      <form id="request-form" class="space-y-4">
        <div>
          <label class="label">Email</label>
          <div class="relative"><i data-lucide="at-sign" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
          <input name="email" type="email" class="input pl-9" placeholder="you@example.com" required /></div>
        </div>
        <button type="submit" class="btn btn-primary w-full"><i data-lucide="send" class="w-4 h-4"></i> Send reset link</button>
      </form>

      <!-- Step 2: reset (revealed after demo token returned) -->
      <form id="reset-form" class="space-y-4 hidden">
        <div class="p-3 rounded-xl bg-brand-500/10 border border-brand-500/30 text-xs text-brand-300">
          Demo mode: the reset token below is normally emailed to you.
        </div>
        <div>
          <label class="label">Reset token</label>
          <input name="token" class="input font-mono text-xs" required />
        </div>
        <div>
          <label class="label">New password</label>
          <div class="relative"><i data-lucide="lock" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
          <input name="password" type="password" class="input pl-9" minlength="8" placeholder="At least 8 characters" required /></div>
        </div>
        <button type="submit" class="btn btn-primary w-full"><i data-lucide="key-round" class="w-4 h-4"></i> Update password</button>
      </form>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    lucide.createIcons({ nameAttr: 'data-lucide' });
    auth.redirectIfAuthed();

    const requestForm = document.getElementById('request-form');
    const resetForm = document.getElementById('reset-form');

    requestForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = new FormData(e.target).get('email');
      try {
        const data = await api.post('/auth/forgot-password', { email });
        ui.toastSuccess('If that email exists, a reset link has been sent.');
        if (data.resetToken) {
          resetForm.classList.remove('hidden');
          requestForm.classList.add('hidden');
          resetForm.querySelector('[name=token]').value = data.resetToken;
        }
      } catch (err) {
        ui.toastError(err.message);
      }
    });

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const body = Object.fromEntries(new FormData(e.target));
      try {
        await api.post('/auth/reset-password', body);
        ui.toastSuccess('Password updated — redirecting to sign in…');
        setTimeout(() => (location.href = '/login'), 800);
      } catch (err) {
        ui.toastError(err.message);
      }
    });
  </script>
</body>
</html>
